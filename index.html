<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスクボード</title>
<style>
  :root{
    --ink:#1a1d24; --sub:#5a6472; --line:#e3e7ee; --paper:#f6f7f9; --card:#ffffff;
    --x-t:#9C0006; --x-b:#fdecee; --x-l:#f0b7bc;
    --sa-t:#9C5700; --sa-b:#fff6e0; --sa-l:#f1d48a;
    --o-t:#1b7a3e; --o-b:#e9f7ee; --o-l:#a9dbbb;
    --op-t:#1F4E79; --op-b:#e7f0fa; --op-l:#a8c6e6;
    --kz-t:#6a28a0; --kz-b:#f3eafa; --kz-l:#cfb0e6;
    --dg-t:#0f766e; --dg-b:#e6f5f2; --dg-l:#a7d8d0;
    --mo-t:#3730a3; --mo-b:#eef0fb; --mo-l:#bcc2ef;
    --now-t:#c2410c; --now-b:#fff7ed; --now-l:#fdba74;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    color:var(--ink); background:var(--paper); -webkit-text-size-adjust:100%;
    display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden; min-height:0;
  }
  header.top{padding:7px 20px 8px; background:#fff; border-bottom:1px solid var(--line); flex:0 0 auto; z-index:20}
  .row1{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .row2{display:flex; align-items:center; gap:8px 16px; flex-wrap:wrap; margin-top:8px}
  h1{font-size:16px; margin:0; letter-spacing:.02em}
  .badge{font:600 11px var(--mono); padding:2px 8px; border-radius:99px; border:1px solid}
  .tabs{display:inline-flex; background:#eef1f6; border:1px solid var(--line); border-radius:9px; padding:3px; gap:2px}
  .tab{font:inherit; font-size:12.5px; font-weight:700; padding:5px 15px; border:none; background:none; color:var(--sub); cursor:pointer; border-radius:7px}
  .tab.on{background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(20,25,40,.12)}
  .banner{margin-top:8px; padding:6px 11px; border:1px solid var(--line); border-radius:8px; font-size:12px; background:#eef1f6}
  .summary{display:flex; gap:7px; flex-wrap:wrap}
  .pill{display:flex; align-items:center; gap:6px; padding:4px 10px; border-radius:8px; border:1px solid var(--line); background:#fbfcfe; font-size:11.5px}
  .pill .n{font:700 14px var(--mono)}
  .pill .lab{color:var(--sub)}
  .pill.total{background:#eef1f6; border-color:#dbe1ea}
  .dot{width:8px;height:8px;border-radius:99px;display:inline-block}
  .filters{display:flex; gap:6px; flex-wrap:wrap; align-items:center}
  .chip{font-size:12.5px; padding:5px 12px; border-radius:99px; cursor:pointer; border:1px solid var(--line); background:#fff; color:var(--sub); user-select:none}
  .chip.on{background:var(--ink); color:#fff; border-color:var(--ink)}
  .spacer{flex:1}
  .reset{font-size:12px; color:var(--sub); background:none; border:none; cursor:pointer; text-decoration:underline; padding:4px}
  .addbtn{font-size:12.5px; font-weight:700; color:#fff; background:var(--ink); border:1px solid var(--ink); border-radius:99px; padding:6px 14px; cursor:pointer}
  .addbtn:hover{background:#000}
  .col-add{margin:2px 10px 12px; padding:8px; border:1px dashed #cfd6e0; background:none; color:var(--sub); border-radius:9px; cursor:pointer; font-size:12.5px}
  .col-add:hover{border-color:#9aa6b8; color:var(--ink); background:#fafbfe}
  .card-actions{margin-left:auto; display:flex; gap:6px}
  .edit,.move{font-size:11.5px; color:var(--sub); border:1px solid var(--line); background:#fff; border-radius:7px; padding:3px 9px; cursor:pointer}
  .edit:hover,.move:hover{border-color:#b9c2ce; color:var(--ink)}
  .modal-backdrop{position:fixed; inset:0; z-index:80; background:rgba(20,25,40,.34); display:flex; align-items:center; justify-content:center; padding:16px}
  .modal-backdrop[hidden]{display:none}
  .modal{background:#fff; border-radius:14px; width:min(480px,100%); max-height:90vh; overflow:auto; box-shadow:0 20px 60px rgba(20,25,40,.3)}
  .modal-head{display:flex; align-items:center; padding:15px 18px; border-bottom:1px solid var(--line)}
  .modal-head b{font-size:15px}
  .modal-head .x{margin-left:auto; border:none; background:none; font-size:20px; color:var(--sub); cursor:pointer; line-height:1; padding:2px 6px}
  .modal-body{padding:16px 18px; display:flex; flex-direction:column; gap:13px}
  .field{display:flex; flex-direction:column; gap:5px}
  .field label{font-size:12px; color:var(--sub); font-weight:700}
  .field input,.field select,.field textarea{font:inherit; font-size:13.5px; padding:8px 10px; border:1px solid #d3d9e2; border-radius:8px; background:#fff; color:var(--ink); width:100%}
  .field textarea{resize:vertical; min-height:52px; line-height:1.5}
  .row2{display:flex; gap:10px}
  .row2>div{flex:1}
  .ferr{color:#9C0006; font-size:12px; min-height:1em}
  .modal-foot{display:flex; align-items:center; gap:8px; padding:14px 18px; border-top:1px solid var(--line)}
  .modal-foot .grow{flex:1}
  .btn{font:inherit; font-size:13px; padding:8px 16px; border-radius:8px; cursor:pointer; border:1px solid var(--line); background:#fff; color:var(--ink)}
  .btn.primary{background:var(--ink); color:#fff; border-color:var(--ink); font-weight:700}
  .btn.primary:hover{background:#000}
  .btn.danger{color:#9C0006; border-color:#f0b7bc; background:#fff}
  .btn.danger:hover{background:#fdecee}
  .main{flex:1 1 auto; min-height:0; display:flex}
  .board{flex:1 1 auto; min-width:0; min-height:0; overflow:auto; display:flex; gap:14px; padding:16px 20px 24px; align-items:stretch}
  .today{flex:0 0 340px; max-width:82vw; border-left:1px solid var(--line); background:#fff; display:flex; flex-direction:column; min-height:0}
  .today.collapsed{display:none}
  .tp-head{display:flex; align-items:center; padding:9px 13px; border-bottom:1px solid var(--line)}
  .tp-head b{font-size:14px}
  .tp-x{margin-left:auto; border:none; background:none; color:var(--sub); font-size:18px; cursor:pointer; line-height:1; padding:2px 6px}
  .tp-datebar{display:flex; align-items:center; gap:6px; padding:7px 12px; border-bottom:1px solid var(--line)}
  .tp-datewrap{position:relative; display:inline-flex; align-items:center}
  .tp-date{font-size:13.5px; font-weight:700; padding:3px 7px; border-radius:6px; cursor:pointer; white-space:nowrap}
  .tp-datewrap:hover .tp-date{background:var(--paper)}
  .tp-pickinput{position:absolute; inset:0; width:100%; height:100%; opacity:0; border:0; padding:0; margin:0; cursor:pointer}
  .nav{font-size:13px; padding:5px 9px; border:1px solid var(--line); background:#fff; border-radius:7px; cursor:pointer; color:var(--ink)}
  .nav:hover{border-color:#b9c2ce}
  .tp-actions{padding:8px 12px; border-bottom:1px solid var(--line); display:flex; flex-direction:column; gap:7px}
  .tp-pick{font-size:13px; font-weight:700; padding:8px; border:1px solid var(--op-l); background:var(--op-b); color:var(--op-t); border-radius:9px; cursor:pointer}
  .tp-pick:hover{filter:brightness(.98)}
  .tp-spot{display:flex; gap:7px}
  .tp-spot input{flex:1; min-width:0; font:inherit; font-size:13px; padding:7px 10px; border:1px solid #d3d9e2; border-radius:8px}
  .tp-spot button{font-size:13px; padding:7px 12px; border:1px solid var(--line); background:#fff; border-radius:8px; cursor:pointer; color:var(--ink)}
  .tp-spot button:hover{border-color:#b9c2ce}
  .tp-list{flex:1 1 auto; overflow:auto; padding:9px 12px; display:flex; flex-direction:column; gap:8px}
  .tp-datebar input[type=date].tp-pickinput{font-size:12px}
  .tp-addbox{position:relative; padding:10px 12px; border-bottom:1px solid var(--line)}
  .tp-addbox input[type=text]{width:100%; font:inherit; font-size:13px; padding:9px 10px; border:1px solid #d3d9e2; border-radius:8px}
  .tp-sug{position:absolute; left:12px; right:12px; top:calc(100% - 2px); background:#fff; border:1px solid var(--line); border-radius:9px; box-shadow:0 10px 26px rgba(20,25,40,.14); z-index:15; overflow:hidden}
  .tp-sug[hidden]{display:none}
  .tp-sug button{display:flex; width:100%; align-items:center; gap:8px; border:none; background:none; text-align:left; padding:9px 11px; font-size:12.5px; cursor:pointer; color:var(--ink)}
  .tp-sug button:hover,.tp-sug button.hi{background:var(--paper)}
  .tp-sug .mini{font-size:10px; color:var(--op-t); background:var(--op-b); padding:1px 7px; border-radius:99px}
  .tp-list{flex:1 1 auto; overflow:auto; padding:10px 12px; display:flex; flex-direction:column; gap:8px}
  .tp-it{display:flex; align-items:flex-start; gap:9px; flex:0 0 auto; background:#fff; border:1px solid var(--line); border-left:3px solid var(--op-l); border-radius:0 10px 10px 0; padding:9px 11px}
  .tp-it.spot{border-left-color:var(--sa-l)}
  .tp-chk{width:16px; height:16px; flex:none; cursor:pointer; margin-top:2px}
  .tp-main{flex:1; min-width:0; min-height:0; display:flex; flex-direction:column; gap:6px}
  .tp-name{font-size:13px; line-height:1.5; color:var(--ink); word-break:break-word; cursor:grab}
  .tp-it.done .tp-name{text-decoration:line-through; color:#9aa2ad}
  .tp-it.tp-chosen{cursor:grabbing}
  .tp-it.tp-drag{box-shadow:0 8px 20px rgba(20,25,40,.18)}
  .tp-it.tp-ghost{opacity:.5; background:#eef4fb; border-style:dashed}
  .tp-note{display:block; height:32px; box-sizing:border-box; resize:none; field-sizing:fixed; font:inherit; font-size:12px; padding:6px 9px; border:1px solid #e3e7ee; border-radius:7px; width:100%; color:var(--ink); background:#fafbfc}
  .tp-note::placeholder{color:#b8c0cb}
  .tp-note:focus{outline:none; border-color:var(--op-l); background:#fff}
  .tp-note-ro{font-size:12px; color:var(--sub); line-height:1.45; background:#f7f8fa; border-radius:6px; padding:5px 8px}
  .tp-del{background:none; border:none; color:#c3ccd6; cursor:pointer; font-size:16px; line-height:1; padding:0 3px; margin-top:1px}
  .tp-del:hover{color:#9C0006}
  .tp-empty{color:#9aa2ad; font-size:12px; text-align:center; padding:14px 6px}
  .tp-actions{padding:10px 12px; border-bottom:1px solid var(--line); display:flex; flex-direction:column; gap:8px}
  .tp-pick{font-size:13px; font-weight:700; padding:9px; border:1px solid var(--op-l); background:var(--op-b); color:var(--op-t); border-radius:9px; cursor:pointer}
  .tp-pick:hover{filter:brightness(.98)}
  .tp-spot{display:flex; gap:7px}
  .tp-spot input{flex:1; min-width:0; font:inherit; font-size:13px; padding:8px 10px; border:1px solid #d3d9e2; border-radius:8px}
  .tp-spot button{font-size:13px; padding:8px 12px; border:1px solid var(--line); background:#fff; border-radius:8px; cursor:pointer; color:var(--ink)}
  .tp-spot button:hover{border-color:#b9c2ce}
  .pk-grp{font-size:11px; color:var(--sub); padding:8px 6px 4px; display:flex; align-items:center; gap:6px}
  .pk-grp .mk{font:700 12px var(--mono)}
  .pk-row{display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:9px; cursor:pointer}
  .pk-row:hover{background:var(--paper)}
  .pk-chk{width:18px; height:18px; border:1.5px solid #c3ccd6; border-radius:5px; flex:none; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px}
  .pk-row.on .pk-chk{background:var(--op-t); border-color:var(--op-t)}
  .pk-row .nm{font-size:13px; flex:1}
  .pk-row.on .nm{color:var(--sub)}
  .pk-row .dep{font-size:10px; color:var(--sub); background:#f1f3f7; padding:1px 7px; border-radius:99px}
  .todaybtn{font-size:11px; font-weight:700; border:1px solid var(--line); background:#fff; color:var(--sub); border-radius:99px; padding:3px 10px; cursor:pointer; white-space:nowrap}
  .todaybtn:hover{border-color:#b9c2ce; color:var(--ink)}
  .todaybtn.on{background:var(--now-t); color:#fff; border-color:var(--now-t)}
  .col{flex:0 0 300px; max-width:300px; background:#fff; border:1px solid var(--line); border-radius:12px; display:flex; flex-direction:column; min-height:100%}
  .col.drop{outline:2px dashed #9aa6b8; outline-offset:-4px; background:#fafbfe}
  .col-head{padding:11px 13px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px; border-radius:12px 12px 0 0; position:sticky; top:0; z-index:5; box-shadow:0 3px 5px -3px rgba(20,25,40,.18)}
  .mark{font:700 15px/1 var(--mono)}
  .col-name{font-weight:700; font-size:13.5px}
  .col-count{margin-left:auto; font:700 12px var(--mono); background:rgba(0,0,0,.06); padding:1px 8px; border-radius:99px}
  .col-body{padding:10px; display:flex; flex-direction:column; gap:9px; flex:1 1 auto}
  .empty{color:#aab2be; font-size:12px; text-align:center; padding:14px 6px}
  .card{background:var(--card); border:1px solid var(--line); border-left:4px solid var(--line); border-radius:9px; padding:10px 11px; cursor:grab; position:relative; box-shadow:0 1px 1px rgba(20,25,40,.03)}
  .card:active{cursor:grabbing}
  .card.active{background:var(--now-b); box-shadow:0 0 0 2px var(--now-l), 0 2px 10px rgba(194,65,12,.14)}
  .card.chosen{cursor:grabbing}
  .card.drag{transform:rotate(2.5deg) scale(1.03); box-shadow:0 12px 26px rgba(20,25,40,.22); opacity:1}
  .card.ghost{opacity:.5; background:#eef4fb; border:1.5px dashed #a8c6e6}
  .nowbtn{margin-left:auto; font:700 10.5px var(--mono); border:1px solid var(--line); background:#fff; color:#9aa2ad; border-radius:99px; padding:2px 9px; cursor:pointer; white-space:nowrap}
  .nowbtn:hover{border-color:#c0c8d2}
  .nowbtn.on{background:var(--now-t); color:#fff; border-color:var(--now-t)}
  .card.flash{animation:flash .7s ease}
  @keyframes flash{0%{background:#fffbe6}100%{background:#fff}}
  .card-top{display:flex; align-items:center; gap:6px; margin-bottom:5px}
  .no{font:600 11px var(--mono); color:#9aa2ad}
  .cstat{font:700 12px var(--mono)}
  .pri{font:700 10.5px var(--mono); padding:1px 6px; border-radius:5px; border:1px solid}
  .dept{font-size:10.5px; color:var(--sub); background:#f1f3f7; padding:1px 7px; border-radius:99px}
  .name{font-size:13px; font-weight:600; line-height:1.4; margin:2px 0 6px; white-space:pre-line}
  .com{font-size:11.5px; color:var(--sub); line-height:1.5; white-space:pre-line; max-height:2.9em; overflow:hidden; cursor:pointer}
  .com.open{max-height:none}
  .com.has::after{content:"　…全文"; color:#9aabc4; font-size:11px}
  .com.open.has::after{content:""}
  .memo{font-size:11.5px; line-height:1.5; white-space:pre-line; margin-top:5px; padding-left:8px; border-left:2px solid currentColor}
  .memo b{font-weight:700; margin-right:5px; font-size:10.5px}
  .memo.ops{color:var(--op-t)}
  .memo.imp{color:var(--kz-t)}
  .card-foot{display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap}
  .upd{font:11px var(--mono); color:#93a0b0}
  .opdate{font:11px var(--mono); color:var(--op-t)}
  .pop{position:fixed; z-index:60; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow:0 10px 30px rgba(20,25,40,.18); padding:6px; min-width:190px}
  .pop .ptitle{font-size:11px; color:var(--sub); padding:5px 8px 6px}
  .pop button{display:flex; width:100%; align-items:center; gap:9px; padding:8px 9px; border:none; background:none; cursor:pointer; border-radius:7px; font-size:13px; color:var(--ink); text-align:left}
  .pop button:hover{background:var(--paper)}
  .pop button[disabled]{opacity:.35; cursor:default}
  .pop .pm{font:700 14px var(--mono); width:16px; text-align:center}
  .backdrop{position:fixed; inset:0; z-index:55}
  .saving{position:fixed; right:16px; bottom:16px; z-index:90; display:flex; align-items:center; gap:8px;
    background:var(--ink); color:#fff; font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:99px;
    box-shadow:0 6px 20px rgba(20,25,40,.25)}
  .saving[hidden]{display:none}
  .sp{width:13px; height:13px; border:2px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:640px){
    .col{flex-basis:82vw; max-width:82vw}
    header.top{padding:12px 14px}
    .board{padding:12px 14px 40px; gap:10px}
  }
</style>
</head>
<body>
<header class="top">
  <div class="row1">
    <h1>タスクボード</h1>
    <span class="badge" id="modeBadge"></span>
    <span class="badge" id="authBadge" hidden>閲覧のみ</span>
    <div class="tabs" id="tabs">
      <button class="tab on" data-board="create">作成タスク</button>
      <button class="tab" data-board="kanri">管理タスク</button>
    </div>
    <span class="spacer"></span>
    <button class="addbtn" id="addBtn">＋ タスク追加</button>
    <button class="reset" id="todayToggle">今日のタスク</button>
    <button class="reset" id="authBtn">ログイン</button>
    <button class="reset" id="reset">再読み込み</button>
  </div>
  <div class="banner" id="banner" hidden></div>
  <div class="row2">
    <div class="summary" id="summary"></div>
    <div class="filters" id="filters">
      <span class="chip on" data-dept="all">すべて</span>
      <span class="chip" data-dept="社内">社内</span>
      <span class="chip" data-dept="営業部">営業部</span>
      <span class="chip" data-dept="土木部">土木部</span>
      <span class="chip" data-dept="品質管理部">品質管理部</span>
    </div>
  </div>
</header>

<div class="main" id="main">
  <div class="board" id="board"></div>
  <aside class="today" id="todayPanel">
    <div class="tp-head">
      <b>今日のタスク</b>
      <button class="tp-x" id="todayClose" aria-label="閉じる">»</button>
    </div>
    <div class="tp-datebar">
      <button class="nav" id="tpPrev" aria-label="前の日">‹</button>
      <span class="tp-datewrap"><span class="tp-date" id="tpDate"></span><input type="date" id="tpPick" class="tp-pickinput" aria-label="日付を選ぶ"></span>
      <button class="nav" id="tpNext" aria-label="次の日">›</button>
      <button class="nav" id="tpToday">今日</button>
    </div>
    <div class="tp-actions" id="tpAddWrap">
      <button class="tp-pick" id="tpOpenPick">＋ ボードから選ぶ</button>
      <div class="tp-spot"><input type="text" id="tpSpot" placeholder="スポット予定を入力（例：A様現場 立会 10:00）"><button id="tpAddSpot">追加</button></div>
    </div>
    <div class="tp-list" id="tpList"></div>
  </aside>
</div>

<div class="saving" id="saving" hidden><span class="sp"></span>保存中…</div>

<div class="modal-backdrop" id="pickBackdrop" hidden>
  <div class="modal" style="width:min(460px,100%);display:flex;flex-direction:column;max-height:86vh" role="dialog" aria-modal="true">
    <div class="modal-head"><b>ボードから選ぶ</b><button class="x" id="pickClose" aria-label="閉じる">×</button></div>
    <div style="padding:11px 16px;border-bottom:1px solid var(--line)"><input type="text" id="pickSearch" placeholder="タスク名で検索…" style="width:100%;font:inherit;font-size:13.5px;padding:9px 11px;border:1px solid #d3d9e2;border-radius:9px"></div>
    <div id="pickBody" style="overflow:auto;padding:8px 10px;flex:1 1 auto"></div>
    <div class="modal-foot"><span id="pickN" style="font-size:12px;color:var(--sub)"></span><span class="grow"></span><button class="btn primary" id="pickDone">完了</button></div>
  </div>
</div>

<div class="modal-backdrop" id="loginBackdrop" hidden>
  <div class="modal" style="width:min(340px,100%)" role="dialog" aria-modal="true">
    <div class="modal-head"><b>ログイン</b><button class="x" id="loginClose" aria-label="閉じる">×</button></div>
    <div class="modal-body">
      <div class="field">
        <label for="f-pw">パスワード</label>
        <input type="password" id="f-pw" inputmode="numeric" autocomplete="current-password" placeholder="パスワードを入力">
      </div>
      <div class="ferr" id="loginErr"></div>
    </div>
    <div class="modal-foot">
      <span class="grow"></span>
      <button class="btn" id="loginCancel">キャンセル</button>
      <button class="btn primary" id="loginSubmit">ログイン</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="editorBackdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head"><b id="editorTitle">タスクを追加</b><button class="x" id="editorClose" aria-label="閉じる">×</button></div>
    <div class="modal-body">
      <div class="field">
        <label for="f-name">タスク内容</label>
        <textarea id="f-name" placeholder="例）在庫管理システムの作成"></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label for="f-dept">部門</label>
          <select id="f-dept"><option>社内</option><option>営業部</option><option>土木部</option><option>品質管理部</option></select>
        </div>
        <div class="field">
          <label for="f-stat">状況</label>
          <select id="f-stat"></select>
        </div>
        <div class="field" id="wrap-pri">
          <label for="f-pri">優先度</label>
          <select id="f-pri">
            <option value="1">1（最優先）</option><option value="2">2</option><option value="3">3</option>
            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="f-com">進捗コメント</label>
        <textarea id="f-com" placeholder="任意"></textarea>
      </div>
      <div class="field" id="wrap-ops">
        <label for="f-ops">運用メモ</label>
        <textarea id="f-ops" placeholder="運用フェーズの記録（任意）"></textarea>
      </div>
      <div class="field" id="wrap-imp">
        <label for="f-imp">改善メモ</label>
        <textarea id="f-imp" placeholder="改善対応の記録（任意）"></textarea>
      </div>
      <div class="ferr" id="editorErr"></div>
    </div>
    <div class="modal-foot">
      <button class="btn danger" id="editorDelete" hidden>削除</button>
      <span class="grow"></span>
      <button class="btn" id="editorCancel">キャンセル</button>
      <button class="btn primary" id="editorSave">保存</button>
    </div>
  </div>
</div>

function colInfo(c){
  if(c.group) return {key:c.group, name:c.name, mark:c.mark, tvar:c.color, bvar:c.bg, members:c.statuses, dropTo:c.defaultStatus, isGroup:true};
  const m = STATUS_META[c.status];
  return {key:c.status, name:m.name, mark:m.k, tvar:m.t, bvar:m.b, members:[c.status], dropTo:c.status, isGroup:false};
}
// 状況セレクト（列単位）用ヘルパー
function colValueForStat(stat){
  const ci = B().columns.map(colInfo).find(c=>c.members.includes(stat));
  return ci ? (ci.isGroup?('grp:'+ci.key):ci.key) : B().statusKeys[0];
}
function resolveStat(val, currentStat){
  if(String(val).indexOf('grp:')===0){
    const key = val.slice(4);
    const cc = B().columns.map(colInfo).find(c=>c.isGroup && c.key===key);
    if(cc) return (currentStat && cc.members.includes(currentStat)) ? currentStat : cc.dropTo;
  }
  return val;
}

const escapeHtml = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// ====== 読み込み ======
function seedClone(b){
  return b.seed.map(t=>({no:t.no,dept:t.dept,name:t.name,stat:t.stat,
    pri:(b.hasPriority?(t.pri||3):null), com:t.com||'', upd:'', opDate:'', ops:'', imp:'', active:false, ord:t.no}));
}
async function loadBoard(key, force){
  const b = BOARDS[key];
  if(store[key] && store[key].loaded && !force) return;
  if(GAS_URL){
    const r = await fetch(GAS_URL + '?board=' + key);
    const j = await r.json();
    if(!j.ok) throw new Error(j.error||'取得に失敗');
    store[key] = { loaded:true, tasks: j.tasks.map(t=>({no:t.no,dept:t.dept,name:t.name,stat:t.stat,
      pri:t.pri, com:t.com||'', upd:t.upd||'', opDate:t.opDate||'', ops:t.ops||'', imp:t.imp||'', active:!!t.active, ord:(t.ord!=null?t.ord:t.no)})) };
  }else{
    store[key] = { loaded:true, tasks: seedClone(b) };
  }
}
async function showBoard(key, force){
  activeBoard = key;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.board===key));
  const _sub=$('sub'); if(_sub) _sub.textContent = B().sub;
  setBanner(GAS_URL ? '読み込み中…' : '');
  try{
    await loadBoard(key, force);
    setBanner(GAS_URL ? '' : '試作モード：この画面内だけの一時保持です（リロードで初期化）');
  }catch(err){
    if(!store[key]) store[key] = { loaded:true, tasks: seedClone(B()) };
    setBanner('サーバー接続に失敗：試作データで表示中（'+err.message+'）', true);
  }
  tasks = store[activeBoard].tasks;
  render();
}
function setBanner(msg, err){
  const b=$('banner');
  if(!msg){ b.hidden=true; b.textContent=''; return; }
  b.hidden=false; b.textContent=msg;
  b.style.color = err?'#9C0006':'#5a6472';
  b.style.background = err?'#fdecee':'#eef1f6';
  b.style.borderColor = err?'#f0b7bc':'#dbe1ea';
}
function flashCard(no){
  requestAnimationFrame(()=>{
    const card=[...document.querySelectorAll('.card')].find(c=>c.querySelector('.no')?.textContent===`#${no}`);
    if(card){card.classList.add('flash'); setTimeout(()=>card.classList.remove('flash'),700);}
  });
}
function priStyle(p){ return ({1:'#b3261e',2:'#c85a12',3:'#8a6d00',4:'#3f6d3f',5:'#5a6472',6:'#7a8494'})[p]||'#5a6472'; }

// ====== 描画 ======
// 並び順：作業中→優先度→手動順(ord)→No
function sortComparator(b){
  return (a,x)=>{
    const av = Number(!!x.active)-Number(!!a.active); if(av) return av;
    if(b.hasPriority){ const pv=(a.pri||99)-(x.pri||99); if(pv) return pv; }
    const ao=(a.ord!=null?a.ord:a.no), xo=(x.ord!=null?x.ord:x.no);
    if(ao!==xo) return ao-xo;
    return (a.no||0)-(x.no||0);
  };
}

function render(){
  const b = B(), cols = b.columns.map(colInfo);
  let sh = `<div class="pill total"><span class="n">${tasks.length}</span><span class="lab">合計</span></div>`;
  cols.forEach(ci=>{
    const n = tasks.filter(t=>ci.members.includes(t.stat)).length;
    sh += `<div class="pill"><span class="dot" style="background:${cv(ci.tvar)}"></span>`
      + `<span class="mark" style="color:${cv(ci.tvar)};font:700 13px var(--mono)">${ci.mark}</span>`
      + `<span class="n">${n}</span><span class="lab">${ci.name}</span></div>`;
  });
  summaryEl.innerHTML = sh;

  boardEl.innerHTML = '';
  cols.forEach(ci=>{
    const col = document.createElement('div');
    col.className='col';
    let items = tasks.filter(t=>ci.members.includes(t.stat) && (filter==='all'||t.dept===filter));
    items.sort(sortComparator(b));
    col.innerHTML = `<div class="col-head" style="background:${cv(ci.bvar)}">
        <span class="mark" style="color:${cv(ci.tvar)}">${ci.mark}</span>
        <span class="col-name" style="color:${cv(ci.tvar)}">${ci.name}</span>
        <span class="col-count" style="color:${cv(ci.tvar)}">${items.length}</span>
      </div><div class="col-body"></div>`;
    const body = col.querySelector('.col-body');
    if(!items.length) body.innerHTML = `<div class="empty">ここに置く</div>`;
    items.forEach(t=>body.appendChild(makeCard(t, ci.isGroup)));
    if(authed){
      const add = document.createElement('button');
      add.className='col-add'; add.textContent='＋ 追加';
      add.addEventListener('click',()=>openEditor(null, ci.dropTo));
      col.appendChild(add);
    }
    const body2 = col.querySelector('.col-body');
    body2.__ci = ci;
    boardEl.appendChild(col);
  });
  if(authed) initSortable();
}
let sortables = [];
function initSortable(){
  if(!window.Sortable) return;
  sortables.forEach(s=>{ try{ s.destroy(); }catch(e){} });
  sortables = [];
  boardEl.querySelectorAll('.col-body').forEach(list=>{
    sortables.push(new Sortable(list, {
      group:'board', animation:180, easing:'cubic-bezier(.2,.8,.2,1)',
      chosenClass:'chosen', dragClass:'drag', ghostClass:'ghost',
      filter:'button', preventOnFilter:false,
      scroll:boardEl, scrollSensitivity:80, scrollSpeed:14, bubbleScroll:true,
      onEnd: onDragEnd
    }));
  });
}
function onDragEnd(evt){
  const no = +evt.item.dataset.no;
  const toCi = evt.to.__ci;
  const t = tasks.find(x=>x.no===no); if(!t || !toCi) return;
  const cardsEls = [...evt.to.querySelectorAll('.card')];
  const pos = cardsEls.indexOf(evt.item);
  const ordOf = el=>{ const tk=tasks.find(x=>x.no===+el.dataset.no); return tk?(tk.ord!=null?tk.ord:tk.no):0; };
  const prevEl = cardsEls[pos-1], nextEl = cardsEls[pos+1];
  const cur = (t.ord!=null?t.ord:t.no);
  let newOrd;
  if(prevEl && nextEl) newOrd = (ordOf(prevEl)+ordOf(nextEl))/2;
  else if(prevEl)      newOrd = ordOf(prevEl)+1;
  else if(nextEl)      newOrd = ordOf(nextEl)-1;
  else                 newOrd = cur;
  applyDrop(no, toCi, newOrd);
}
async function applyDrop(no, toCi, newOrd){
  const t = tasks.find(x=>x.no===no); if(!t) return;
  const changing = !toCi.members.includes(t.stat);
  const prev = {stat:t.stat, ord:t.ord, upd:t.upd, opDate:t.opDate};
  t.ord = newOrd;
  if(changing){ t.stat = toCi.dropTo; t.upd = today(); if(toCi.dropTo==='◎' && B().hasMemo && !t.opDate) t.opDate = today(); }
  render();
  if(GAS_URL){
    try{
      if(changing){ const j = await gasPost({action:'move', board:activeBoard, no:no, stat:t.stat, ord:newOrd}); t.upd=j.date||t.upd; if(j.opDate) t.opDate=j.opDate; }
      else { await gasPost({action:'reorder', board:activeBoard, no:no, ord:newOrd}); }
      render();
    }catch(err){ Object.assign(t, prev); render(); setBanner('保存に失敗：'+err.message+'（元に戻しました）', true); }
  }
}
function makeCard(t, showStat){
  const b = B(), meta = STATUS_META[t.stat];
  const el=document.createElement('div');
  el.className='card' + (t.active?' active':''); el.dataset.no = t.no; el.style.borderLeftColor=cv(meta.l);
  const hasCom = t.com && t.com.trim().length>0;
  const statMark = showStat ? `<span class="cstat" style="color:${cv(meta.t)}">${t.stat}</span>` : '';
  const pri = (b.hasPriority && t.pri) ? `<span class="pri" style="color:${priStyle(t.pri)};border-color:${priStyle(t.pri)}22;background:${priStyle(t.pri)}0f">P${t.pri}</span>` : '';
  const nowEl = authed
    ? `<button class="nowbtn ${t.active?'on':''}" title="作業中の切り替え">${t.active?'● 作業中':'○ 作業中'}</button>`
    : (t.active ? `<span class="nowbtn on" style="cursor:default">● 作業中</span>` : '');
  const inToday = planHasBoardNo(t.no);
  const todayEl = authed
    ? `<button class="todaybtn ${inToday?'on':''}" title="今日のタスクに入れる">${inToday?'✓ 今日':'＋ 今日'}</button>`
    : (inToday ? `<span class="todaybtn on" style="cursor:default">✓ 今日</span>` : '');
  const actions = authed ? `<span class="card-actions">${todayEl}<button class="edit">✎ 編集</button><button class="move">⇄ 移動</button></span>` : (todayEl?`<span class="card-actions">${todayEl}</span>`:'');
  el.innerHTML =
    `<div class="card-top">${statMark}<span class="no">#${t.no}</span>${pri}<span class="dept">${t.dept}</span>${nowEl}</div>
     <div class="name">${escapeHtml(t.name)}</div>
     ${hasCom?`<div class="com has">${escapeHtml(t.com)}</div>`:''}
     ${(b.hasMemo&&t.ops)?`<div class="memo ops"><b>運用</b> ${escapeHtml(t.ops)}</div>`:''}
     ${(b.hasMemo&&t.imp)?`<div class="memo imp"><b>改善</b> ${escapeHtml(t.imp)}</div>`:''}
     <div class="card-foot">
       ${t.upd?`<span class="upd">更新 ${t.upd}</span>`:`<span class="upd" style="color:#c3ccd6">未更新</span>`}
       ${actions}
     </div>`;
  const com = el.querySelector('.com');
  if(com) com.addEventListener('click',()=>com.classList.toggle('open'));
  if(authed){
    el.querySelector('.todaybtn').addEventListener('click',e=>{e.stopPropagation(); toggleTodayBoard(t.no, t.name);});
    el.querySelector('.nowbtn').addEventListener('click',e=>{e.stopPropagation(); toggleActive(t.no);});
    el.querySelector('.edit').addEventListener('click',e=>{e.stopPropagation(); openEditor(t);});
    el.querySelector('.move').addEventListener('click',e=>{e.stopPropagation(); openPop(e.currentTarget,t);});
  }
  return el;
}
async function toggleActive(no){
  if(!authed) return;
  const t = tasks.find(x=>x.no===no); if(!t) return;
  t.active = !t.active; render();
  if(GAS_URL){
    try{ await gasPost({action:'flag', board:activeBoard, no:no, active:t.active}); }
    catch(err){ setBanner('作業中フラグは画面上のみ反映（保存にはGASの再デプロイが必要）', true); }
  }
}

// ====== 移動 ======
async function moveTask(no, newK){
  const t = tasks.find(x=>x.no===no);
  if(!t || t.stat===newK) return;
  const prev = {stat:t.stat, upd:t.upd, opDate:t.opDate};
  t.stat=newK; t.upd=today();
  if(newK==='◎' && B().hasMemo && !t.opDate) t.opDate=today();
  render(); flashCard(no);
  if(GAS_URL){
    try{
      const j = await gasPost({action:'move', board:activeBoard, no:no, stat:newK});
      t.upd = j.date || t.upd; if(j.opDate) t.opDate = j.opDate; render();
    }catch(err){ Object.assign(t, prev); render(); setBanner('保存に失敗：'+err.message+'（表示を元に戻しました）', true); }
  }
}

let editingNo = null;
function openEditor(task, presetStat){
  if(!authed) return;
  const b = B();
  editingNo = task ? task.no : null;
  $('editorTitle').textContent = task ? `タスクを編集（#${task.no}）` : `タスクを追加（${b.label}）`;
  $('f-stat').innerHTML='';
  b.columns.map(colInfo).forEach(ci=>{ const o=document.createElement('option');
    o.value = ci.isGroup ? ('grp:'+ci.key) : ci.key; o.textContent = `${ci.mark} ${ci.name}`; $('f-stat').appendChild(o); });
  $('f-name').value = task ? task.name : '';
  $('f-dept').value = task ? task.dept : (filter!=='all'? filter : '社内');
  $('f-stat').value = colValueForStat(task ? task.stat : (presetStat || b.statusKeys[0]));
  $('f-pri').value  = String(task ? (task.pri||3) : 3);
  $('f-com').value  = task ? task.com : '';
  $('f-ops').value  = task ? (task.ops||'') : '';
  $('f-imp').value  = task ? (task.imp||'') : '';
  $('wrap-pri').style.display = b.hasPriority ? '' : 'none';
  $('wrap-ops').style.display = b.hasMemo ? '' : 'none';
  $('wrap-imp').style.display = b.hasMemo ? '' : 'none';
  $('editorErr').textContent='';
  $('editorDelete').hidden = !task;
  $('editorBackdrop').hidden = false;
  setTimeout(()=>$('f-name').focus(), 30);
}
function closeEditor(){ $('editorBackdrop').hidden=true; editingNo=null; }
async function saveEditor(){
  const b = B();
  const name = $('f-name').value.trim();
  if(!name){ $('editorErr').textContent='タスク内容を入力してください'; return; }
  const rawStat = $('f-stat').value;
  const curStat = editingNo!=null ? (tasks.find(x=>x.no===editingNo)||{}).stat : null;
  const f = { name, dept:$('f-dept').value, stat:resolveStat(rawStat, curStat), com:$('f-com').value.trim() };
  if(b.hasPriority) f.pri = +$('f-pri').value;
  if(b.hasMemo){ f.ops=$('f-ops').value.trim(); f.imp=$('f-imp').value.trim(); }
  $('editorSave').disabled=true; $('editorSave').textContent='保存中…'; $('editorErr').textContent='';
  try{
    if(editingNo==null) await addTask(f); else await updateTask(editingNo, f);
    closeEditor();
  }catch(err){ $('editorErr').textContent='保存に失敗：'+err.message; }
  finally{ $('editorSave').disabled=false; $('editorSave').textContent='保存'; }
}
let savingCount = 0;
function savingStart(){ savingCount++; $('saving').hidden=false; }
function savingEnd(){ savingCount=Math.max(0,savingCount-1); if(savingCount===0) $('saving').hidden=true; }
async function gasPost(payload){
  savingStart();
  try{
    const r = await fetch(GAS_URL, {method:'POST', body:JSON.stringify(Object.assign({pw:pw}, payload))});
    const j = await r.json();
    if(!j.ok){
      if(String(j.error||'').indexOf('認証')>=0){ authed=false; pw=null; lsDel(LS_KEY); updateAuthUI(); render(); }
      throw new Error(j.error||'サーバーエラー');
    }
    return j;
  } finally { savingEnd(); }
}
// ログイン状態のUI反映
function updateAuthUI(){
  $('addBtn').style.display = authed ? '' : 'none';
  $('authBtn').textContent = authed ? 'ログアウト' : 'ログイン';
  const ab = $('authBadge');
  ab.hidden = authed;
  if(!authed){ ab.textContent='閲覧のみ'; ab.style.color='#8a5a00'; ab.style.background='#fff4d6'; ab.style.borderColor='#f0d488'; }
  if(typeof renderPlan==='function') renderPlan();
}
function openLogin(){ $('loginErr').textContent=''; $('f-pw').value=''; $('loginBackdrop').hidden=false; setTimeout(()=>$('f-pw').focus(),30); }
function closeLogin(){ $('loginBackdrop').hidden=true; }
async function submitLogin(){
  const entered = $('f-pw').value;
  if(!entered){ $('loginErr').textContent='パスワードを入力してください'; return; }
  $('loginSubmit').disabled=true;
  try{
    const r = await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'auth', pw:entered})});
    const j = await r.json();
    if(j.ok){ pw=entered; authed=true; lsSet(LS_KEY, pw); updateAuthUI(); render(); closeLogin(); }
    else { $('loginErr').textContent='パスワードが違います'; }
  }catch(err){ $('loginErr').textContent='通信エラー：'+err.message; }
  finally{ $('loginSubmit').disabled=false; }
}
function logout(){ authed=false; pw=null; lsDel(LS_KEY); updateAuthUI(); render(); }
async function addTask(f){
  if(GAS_URL){
    const j = await gasPost({action:'add', board:activeBoard, task:f});
    tasks.push({no:j.task.no, dept:f.dept, name:f.name, stat:f.stat, pri:(f.pri??null),
      com:f.com, ops:f.ops||'', imp:f.imp||'', upd:j.task.upd||today(), opDate:j.task.opDate||'', active:false, ord:j.task.no});
  }else{
    const no = tasks.reduce((m,t)=>Math.max(m,+t.no||0),0)+1;
    tasks.push({no, dept:f.dept, name:f.name, stat:f.stat, pri:(f.pri??null),
      com:f.com, ops:f.ops||'', imp:f.imp||'', upd:today(), opDate:(f.stat==='◎'?today():''), active:false, ord:no});
  }
  render();
}
async function updateTask(no, f){
  const t = tasks.find(x=>x.no===no); if(!t) return;
  const prev = {...t};
  Object.assign(t, f, {upd:today()});
  if(f.stat==='◎' && B().hasMemo && !t.opDate) t.opDate=today();
  render();
  if(GAS_URL){
    try{ const j = await gasPost({action:'update', board:activeBoard, no:no, task:f}); if(j.date) t.upd=j.date; if(j.opDate) t.opDate=j.opDate; render(); }
    catch(err){ Object.assign(t, prev); render(); throw err; }
  }
}
async function deleteTask(no){
  const idx = tasks.findIndex(x=>x.no===no); if(idx<0) return;
  const removed = tasks[idx];
  tasks.splice(idx,1); render();
  if(GAS_URL){
    try{ await gasPost({action:'delete', board:activeBoard, no:no}); }
    catch(err){ tasks.splice(idx,0,removed); render(); setBanner('削除に失敗：'+err.message, true); }
  }
}

// ====== 移動ポップオーバー ======
let backdrop=null;
function openPop(btn,t){
  closePop();
  backdrop=document.createElement('div'); backdrop.className='backdrop'; backdrop.addEventListener('click',closePop);
  document.body.appendChild(backdrop);
  const pop=document.createElement('div'); pop.className='pop';
  pop.innerHTML=`<div class="ptitle">移動先を選ぶ</div>`;
  statusesOf(B()).forEach(s=>{
    const btn2=document.createElement('button');
    btn2.innerHTML=`<span class="pm" style="color:${cv(s.t)}">${s.k}</span>${s.name}`;
    if(s.k===t.stat){ btn2.disabled=true; btn2.innerHTML+=` <span style="color:#b6bdc7;font-size:11px;margin-left:auto">現在</span>`; }
    else btn2.addEventListener('click',()=>{closePop(); moveTask(t.no,s.k);});
    pop.appendChild(btn2);
  });
  document.body.appendChild(pop);
  const r=btn.getBoundingClientRect();
  let top=r.bottom+6, left=Math.min(r.left, window.innerWidth-210);
  if(top+pop.offsetHeight>window.innerHeight-10) top=r.top-pop.offsetHeight-6;
  pop.style.top=Math.max(10,top)+'px'; pop.style.left=Math.max(10,left)+'px';
}
function closePop(){ document.querySelectorAll('.pop').forEach(p=>p.remove()); if(backdrop){backdrop.remove(); backdrop=null;} }

// ====== 今日のタスク（右パネル） ======
let planDate = new Date(); planDate.setHours(0,0,0,0);
let planItems = [];
let planHi = -1;
const isoD = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const WK = ['日','月','火','水','木','金','土'];
function allBoardTasks(){ let out=[]; Object.keys(store).forEach(k=>{ if(store[k]&&store[k].tasks) out=out.concat(store[k].tasks); }); return out; }

async function loadPlan(){
  $('tpDate').textContent = (planDate.getMonth()+1)+'月'+planDate.getDate()+'日 ('+WK[planDate.getDay()]+')';
  $('tpPick').value = isoD(planDate);
  if(GAS_URL){
    try{ const r=await fetch(GAS_URL+'?plan='+isoD(planDate)); const j=await r.json(); planItems = j.ok? j.entries : []; }
    catch(e){ planItems=[]; }
  } else planItems=[];
  syncToday();
}
function renderPlan(){
  const l=$('tpList'); if(!l) return;
  const aw=$('tpAddWrap'); if(aw) aw.style.display = authed ? '' : 'none';
  l.innerHTML='';
  if(!planItems.length){ l.innerHTML='<div class="tp-empty">'+(authed?'入力またはボード名で追加':'今日のタスクはありません')+'</div>'; return; }
  planItems.forEach(it=>{
    const row=document.createElement('div'); row.className='tp-it '+it.type+(it.done?' done':''); row.dataset.id=it.id;
    const cb='<input type="checkbox" class="tp-chk" '+(it.done?'checked':'')+(authed?'':' disabled')+'>';
    const del=authed?'<button class="tp-del" aria-label="削除">×</button>':'';
    let noteHtml='';
    if(it.type==='board'){
      if(authed) noteHtml='<input class="tp-note" placeholder="内容・メモを追加" value="'+escapeHtml(it.note||'').replace(/"/g,'&quot;')+'">';
      else if(it.note) noteHtml='<div class="tp-note-ro">'+escapeHtml(it.note)+'</div>';
    }
    row.innerHTML=cb+'<div class="tp-main"><div class="tp-name">'+escapeHtml(it.label)+'</div>'+noteHtml+'</div>'+del;
    if(authed){
      row.querySelector('.tp-chk').addEventListener('change',()=>planSetDone(it.id, !it.done));
      row.querySelector('.tp-del').addEventListener('click',()=>planRemove(it.id));
      const nt=row.querySelector('.tp-note');
      if(nt){ nt.addEventListener('change',()=>planSetNote(it.id, nt.value)); nt.addEventListener('keydown',e=>{ if(e.key==='Enter') nt.blur(); }); }
    }
    l.appendChild(row);
  });
  initPlanSortable();
}
let planSortable=null;
function initPlanSortable(){
  if(!window.Sortable) return;
  if(planSortable){ try{ planSortable.destroy(); }catch(e){} planSortable=null; }
  if(!authed) return;
  planSortable = new Sortable($('tpList'), {
    animation:160, easing:'cubic-bezier(.2,.8,.2,1)',
    chosenClass:'tp-chosen', dragClass:'tp-drag', ghostClass:'tp-ghost',
    filter:'input,button', preventOnFilter:false,
    onEnd: onPlanDragEnd
  });
}
function onPlanDragEnd(evt){
  const id = evt.item.dataset.id;
  const ids = [...evt.to.querySelectorAll('.tp-it')].map(el=>el.dataset.id);
  const pos = ids.indexOf(id);
  const ordOf = i => { const it=planItems.find(x=>x.id===i); return it&&it.ord!=null?it.ord:0; };
  const prev = ids[pos-1], next = ids[pos+1];
  let newOrd;
  if(prev!=null && next!=null) newOrd=(ordOf(prev)+ordOf(next))/2;
  else if(prev!=null) newOrd=ordOf(prev)+1;
  else if(next!=null) newOrd=ordOf(next)-1;
  else return;
  planReorderItem(id, newOrd);
}
async function planReorderItem(id, ord){
  const it=planItems.find(x=>x.id===id); if(!it) return;
  it.ord=ord;
  planItems.sort((a,b)=>(a.ord!=null?a.ord:0)-(b.ord!=null?b.ord:0));
  if(!GAS_URL) return;
  try{ await gasPost({action:'plan_reorder', id:id, ord:ord}); }
  catch(e){ setBanner('並び順の保存に失敗：'+e.message,true); }
}
async function planAddItem(type, ref, label){
  if(!authed) return;
  const tmp={id:'tmp'+Date.now(), type:type, ref:ref, label:label, done:false};
  planItems.push(tmp); syncToday();
  if(!GAS_URL) return;
  try{ const j=await gasPost({action:'plan_add', date:isoD(planDate), itemType:type, ref:(ref==null?'':ref), label:label}); tmp.id=j.entry.id; }
  catch(e){ planItems=planItems.filter(x=>x!==tmp); syncToday(); setBanner('追加に失敗：'+e.message,true); }
}
async function planSetDone(id, done){
  const it=planItems.find(x=>x.id===id); if(!it) return;
  it.done=done; renderPlan();
  try{ await gasPost({action:'plan_done', id:id, done:done}); }
  catch(e){ it.done=!done; renderPlan(); setBanner('更新に失敗：'+e.message,true); }
}
async function planRemove(id){
  const idx=planItems.findIndex(x=>x.id===id); if(idx<0) return;
  const rm=planItems[idx]; planItems.splice(idx,1); syncToday();
  if(!GAS_URL) return;
  try{ await gasPost({action:'plan_del', id:id}); }
  catch(e){ planItems.splice(idx,0,rm); syncToday(); setBanner('削除に失敗：'+e.message,true); }
}
async function planSetNote(id, note){
  const it=planItems.find(x=>x.id===id); if(!it) return;
  it.note=note;
  if(!GAS_URL) return;
  try{ await gasPost({action:'plan_note', id:id, note:note}); }
  catch(e){ setBanner('メモ保存に失敗：'+e.message,true); }
}
function planUsedNo(){ const u={}; planItems.forEach(x=>{ if(x.type==='board') u[x.ref]=1; }); return u; }
function planHasBoardNo(no){ return planItems.some(x=>x.type==='board' && String(x.ref)===String(no)); }
function toggleTodayBoard(no, name){
  if(!authed) return;
  const ex = planItems.find(x=>x.type==='board' && String(x.ref)===String(no));
  if(ex) planRemove(ex.id); else planAddItem('board', no, name);
}
function syncToday(){
  renderPlan();
  if(store[activeBoard] && store[activeBoard].loaded) render();
  if(!$('pickBackdrop').hidden) renderPicker();
}
// ボードから選ぶ（ピッカー）
function openPicker(){ $('pickSearch').value=''; $('pickBackdrop').hidden=false; renderPicker(); setTimeout(()=>$('pickSearch').focus(),30); }
function closePicker(){ $('pickBackdrop').hidden=true; }
function renderPicker(){
  const b=B(), q=$('pickSearch').value.trim().toLowerCase(), body=$('pickBody');
  body.innerHTML='';
  b.columns.map(colInfo).forEach(ci=>{
    const list = tasks.filter(t=>ci.members.includes(t.stat) && (filter==='all'||t.dept===filter) && (!q || String(t.name).toLowerCase().indexOf(q)>=0));
    if(!list.length) return;
    const g=document.createElement('div'); g.className='pk-grp';
    g.innerHTML=`<span class="mk" style="color:${cv(ci.tvar)}">${ci.mark}</span>${ci.name}`;
    body.appendChild(g);
    list.forEach(t=>{
      const on=planHasBoardNo(t.no);
      const row=document.createElement('div'); row.className='pk-row'+(on?' on':'');
      row.innerHTML=`<span class="pk-chk">${on?'✓':''}</span><span class="nm">${escapeHtml(t.name)}</span><span class="dep">${t.dept}</span>`;
      row.addEventListener('click',()=>toggleTodayBoard(t.no, t.name));
      body.appendChild(row);
    });
  });
  if(!body.children.length) body.innerHTML='<div class="tp-empty">該当なし</div>';
  $('pickN').textContent='今日に '+planItems.filter(x=>x.type==='board').length+' 件';
}

$('modeBadge').style.color = GAS_URL ? '#1b6e3f' : '#8a5a00';
$('modeBadge').style.background = GAS_URL ? '#e9f7ee' : '#fff4d6';
$('modeBadge').style.borderColor = GAS_URL ? '#a9dbbb' : '#f0d488';
